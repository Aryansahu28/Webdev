<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone with media</title>
    <link rel="stylesheet" href="netflix_style.css">
</head>

<body>
    <header>
        <nav>
            <img src="Netflix_Logo_RGB.png" alt="netflix">
            <div class="sidebar">
                <div class="translate">
                    <select name="language" id="language">
                        <!-- <img src="icons8-translate-50.svg" alt="icon"> -->
                        <option value="English">English</option>
                        <option value="Hindi">Hindi</option>
                    </select>
                </div>
                <div class="signout">Sign out</div>
            </div>
        </nav>
        <div class="maincontent">
            <h1>
                Unlimited films, series and more
            </h1>
            <div class="start">Starts at ₹149. Cancel at any time.</div>
            <div class="red-btn">Get Started ></div>
        </div>
        <div class="trendingnow"><div class="oval"> </div>Trending Now</div>
    </header>
</body>

</html>
