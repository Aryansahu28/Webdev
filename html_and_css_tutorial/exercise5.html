<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Design Site</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        /* 1. Global Reset & Fonts */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Ensures padding doesn't break widths */
        }

        body {
            /* Cream/Off-white background is easier on the eyes than stark white */
            background-color: #fdfbf7;
            font-family: 'Lato', sans-serif;
            /* Clean font for body */
            color: #333;
        }

        /* 2. Header & Nav - Deep Navy Blue */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            /* Subtle shadow instead of border */
        }

        nav {
            width: 100%;
            height: 10vh;
            /* Classic Navy Blue */
            background-color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }

        /* Adding text to nav via CSS just for visual balance */
        nav::after {
            content: "MENU";
            letter-spacing: 2px;
            font-weight: bold;
            color: #ecf0f1;
        }

        /* 3. Container - Clean Grey */
        .container {
            width: 100%;
            height: 90vh;
            background-color: #ecf0f1;
            /* Light grey instead of Aqua */

            /* Using Flexbox to center the boxes perfectly */
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            /* Space between boxes */
        }

        .box {
            width: 30%;
            height: 70%;
            border-radius: 8px;
            /* Soft rounded corners */

            /* Elegant Shadow */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            /* Animation on hover */
        }

        /* Interactive effect */
        .box:hover {
            transform: translateY(-10px);
        }

        /* Classic Color 1: Slate Blue */
        .box1 {
            background-color: #34495e;
            border-top: 5px solid #2c3e50;
        }

        /* Classic Color 2: Rust/Burgundy */
        .box2 {
            background-color: #c0392b;
            border-top: 5px solid #922b21;
        }

        /* 4. SemiBox - The Banner */
        .semibox {
            /* Centering technique */
            margin: 50px auto;
            padding: 40px;

            width: 80vw;
            height: auto;
            /* Let height grow with text */

            background-color: #fff;
            border: 1px solid #d4af37;
            /* Thin Gold Border */
            border-left: 10px solid #d4af37;
            /* Thick Gold Accent */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);

            text-align: center;
            font-family: 'Playfair Display', serif;
            /* Classic Headline Font */
            font-size: 3rem;
            color: #2c3e50;
        }

        /* 5. Icon - The Gold Action Button */
        .icon {
            position: fixed;
            bottom: 30px;
            right: 30px;

            width: 80px;
            height: 80px;
            border-radius: 50%;

            /* Gold Gradient */
            background: linear-gradient(145deg, #f1c40f, #d4af37);
            border: none;

            /* Make it pop */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;

            /* Center text inside */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 30px;
        }

        .icon::after {
            content: "↑";
            /* Arrow icon */
        }

        /* 6. Footer - Dark to match Header */
        footer {
            width: 100%;
            height: 15vh;
            background-color: #1a252f;
            /* Darker than header */
            color: #7f8c8d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
        }

        footer::after {
            content: "© 2024 Classic Designs";
        }
    </style>
</head>

<body>
    <header>
        <nav></nav>
    </header>

    <div class="container">
        <div class="box box1"></div>
        <div class="box box2"></div>
    </div>

    <div class="semibox">Welcome to Sigma Web Development</div>

    <div class="icon"></div>

    <footer></footer>
</body>

</html>
