<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraEdit</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        nav {
            background:linear-gradient(0.25turn, #84ffc9, #aab2ff, #eca0ff);
            display: flex;
            flex-direction: row;
            justify-content: space-around;

        }

        div ul {
            display: flex;
            gap: 20px;
        }

        div ul li {
            padding-top:15px;
            list-style-type: none;
        }

        .icon {
            width: 168px;
            height: 55px;
        }

        .down-arrow {
            width: 10px;
            height: 10px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <img class="icon" src="UE_Site-Logo.png" alt="UltraEdit">
            <div>
                <ul>
                    <li>Product <img class="down-arrow" src="downarrow.png" alt="downarrow"></li>
                    <li>Buy</li>
                    <li>Support <img class="down-arrow" src="downarrow.png" alt="downarrow"></li>
                    <li>Learn <img class="down-arrow" src="downarrow.png" alt="downarrow"></li>
                    <li>Company <img class="down-arrow" src="downarrow.png" alt="downarrow"></li>
                    <li><img class="down-arrow" src="newtranslate.png" alt="downarrow"></li>
                </ul>
            </div>
        </nav>
    </header>
</body>

</html>
