<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball</title>
    <style>
        .container {
            box-sizing: border-box;
            border: 2px solid black;
            width: 80vw;
            height: 80vh;
            position: absolute;
        }

        .ball {
            box-sizing: border-box;
            border: 2px solid black;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background-color: red;
            position:relative;
    animation: movePath 5s linear infinite;

        }


        @keyframes movePath {

    /* Position 1 — top left */
    0%{
        left:0;
        top:0;
    }

    /* Position 2 — bottom left */
    30%{
        left:80px;
        top:calc(100% - 50px);
    }

    /* Position 3 — middle bounce */
    60%{
        left:40%;
        top:40%;
    }

    /* Position 4 — bottom right */
    100%{
        left:calc(100% - 50px);
        top:calc(100% - 50px);
    }
}
    </style>
</head>

<body>
    <div class="container">
        <div class="ball translate1 translate2"></div>
    </div>

</body>

</html>
