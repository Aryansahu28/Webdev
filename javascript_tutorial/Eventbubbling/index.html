<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bubbling</title>

    <style>
    .child {
            background-color: aliceblue;
            border: 2px solid black;
            padding: 14px;
            margin: 14px;
            cursor: pointer;
        }

    .childsection {
            background-color: beige;
            padding: 14px;
            margin: 14px;
        }

    .container {
            background-color: rgb(227, 227, 28);
            padding: 14px;
            margin: 14px;
        }
        </style>
</head>
<body>
    <div class="container">
        <section class="childsection">
            <div class="child">
                <button>I am Child</button>
            </div>
        </section>
    </div>
    <script>
        document.querySelector(".child").addEventListener("click",(e)=>{
            e.stopPropagation();
            alert("Child class is clicked")})
        document.querySelector(".childsection").addEventListener("click",(e)=>{
            e.stopPropagation()
            alert("Child container class is clicked")})
        document.querySelector(".container").addEventListener("click",(e)=>{
            e.stopPropagation()
            alert("Container class is clicked")
        })
    </script>
</body>
</html>
